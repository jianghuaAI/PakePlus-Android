name: Android Build

on:
    workflow_dispatch:
    # push:
    #     branches:
    #         - 'main'

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    build:
        name: Build APK
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v5

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: 'temurin'
                  java-version: '17'
                  cache: gradle

            - name: Set up Android SDK
              uses: android-actions/setup-android@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Sync node version and setup cache
              uses: actions/setup-node@v5
              with:
                  node-version: 22.14.0
                  cache: pnpm

            - name: Install ImageMagick
              run: |
                  sudo apt-get update
                  sudo apt-get install imagemagick
                  convert --version

            - name: Init Project Config
              run: |
                  pnpm install
                  pnpm pp:worker

            - name: Decode Keystore (optional, only when KEYSTORE_BASE64 secret is set)
              env:
                  KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
              run: |
                  if [ -n "$KEYSTORE_BASE64" ]; then
                    echo "$KEYSTORE_BASE64" | base64 -d > pakeplus.keystore
                    echo "keystore decoded"
                  else
                    echo "KEYSTORE_BASE64 not set, skipping (debug build uses default signing)"
                  fi

            - name: Grant Execute Permission for Gradle
              run: chmod +x ./gradlew

            - name: Build Debug APK
              run: ./gradlew assembleDebug --no-daemon

            - name: Sync VERSION from gradle versionName
              run: |
                  VER=$(grep -oP 'versionName\s*=\s*"\K[0-9.]+' app/build.gradle.kts)
                  echo "VERSION=$VER" >> "$GITHUB_ENV"
                  echo "Synced VERSION=$VER"

            - name: Rename APK file
              run: |
                  cd app/build/outputs/apk/debug/
                  mv app-debug.apk ${{ env.NAME }}-v${{ env.VERSION }}.apk

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: app/build/outputs/apk/debug/*.apk
                  tag_name: '${{ env.NAME }}'
                  name: '${{ env.NAME }} v${{ env.VERSION }}'
                  body: '${{ env.PUBBODY }}'
                  draft: false
                  remove: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NAME: ${{ env.NAME }}
                  VERSION: ${{ env.VERSION }}
                  PUBBODY: ${{ env.PUBBODY }}
